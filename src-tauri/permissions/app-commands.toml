[[permission]]
identifier = "allow-app-commands"
description = "Enables custom Roam commands invoked from the frontend."
commands.allow = [
  "combine_config_path",
  "connect_google_calendar_desktop",
  "convert_path",
  "get_mouse_position",
  "is_google_calendar_desktop_oauth_configured",
  "open_folder",
  "reopen_main_window",
]
